<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darren & Tina 2026</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --morandi-olive: #6B705C;
            --morandi-beige: #B7B7A4;
            --morandi-gold: #DDB892;
            --morandi-text: #4A4E40;
            --bg-light: #F8F7F2;
            --heart-pink: #F8AD9D;
        }

        body { 
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--morandi-text); 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            padding-bottom: calc(110px + env(safe-area-inset-bottom)); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .heart-text { 
            color: var(--heart-pink); 
            font-size: 0.75rem; 
            letter-spacing: 0.5em; 
            font-weight: 800; 
            margin-bottom: 0.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .couple-name { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.4rem; 
            line-height: 1.1; 
            font-weight: 700; 
            color: #2D3128; 
            letter-spacing: 0.05em;
            margin: 0.5rem 0; 
        }
        .ampersand { font-family: sans-serif !important; font-weight: 400; margin: 0 6px; }
        
        .main-header {
            background: white;
            padding: calc(2.5rem + env(safe-area-inset-top)) 1rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .app-card {
            background: white;
            border-radius: 1.2rem;
            box-shadow: 0 4px 12px -5px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            overflow: hidden;
        }

        .bottom-nav {
            background: rgba(74, 78, 64, 0.95);
            backdrop-filter: blur(15px);
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 416px; 
            border-radius: 2rem;
            height: 65px; 
            z-index: 1000;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav-btn { font-size: 1.25rem; cursor: pointer; transition: opacity 0.2s; padding: 12px; }
        .btn-press:active { transform: scale(0.92); }

        #gemini-modal, .custom-modal {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.4);
            visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        #gemini-modal.open, .custom-modal.open { visibility: visible; opacity: 1; }
        
        #gemini-panel, .modal-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 85%; background: #F8F7F2; border-radius: 2rem 2rem 0 0;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1);
            padding-bottom: env(safe-area-inset-bottom); 
            display: block !important;
        }
        #gemini-modal.open #gemini-panel, .custom-modal.open .modal-panel { transform: translateY(0); }
        
        .centered-modal-content {
            background: white; border-radius: 1.5rem; width: 90%; max-width: 340px;
            padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1);
        }
        .custom-modal.open .centered-modal-content { transform: scale(1); }

        .tag { font-size: 11px; font-weight: 900; padding: 3px 10px; border-radius: 8px; display: inline-block; }
        .tag-type { background: #F3F4F6; color: #4B5563; border: 1px solid #E5E7EB; }

        input, select, textarea { font-size: 16px !important; }

        .filter-chip {
            padding: 12px 16px; border-radius: 1.2rem; font-size: 11px; font-weight: 700;
            background: white; border: 1px solid #E5E7EB; color: #9CA3AF; transition: all 0.2s;
            text-align: left; min-width: 120px;
        }
        .filter-chip.active { background: #6B705C; border-color: #6B705C; color: white; }
        
        .expand-panel { display: none; margin-top: 12px; }
        .expand-panel.active { display: block; }

        .weather-card {
            background: linear-gradient(135deg, #8E9775 0%, #6B705C 100%);
            color: white; border-radius: 1.2rem; padding: 1.5rem; margin-bottom: 1.5rem;
            position: relative; overflow: hidden;
        }

        .action-link {
            font-size: 11px; font-weight: 800; color: #8E9775;
            padding: 8px 14px; border: 1.5px solid #E5E7EB; border-radius: 20px;
            display: inline-flex; align-items: center; gap: 4px;
            background: white; transition: all 0.2s;
            cursor: pointer;
            text-decoration: none; 
            line-height: 1.2;
        }
        .action-link:active { background: #f0f0f0; transform: scale(0.98); }
        .ai-btn { border-color: #DDB892; color: #b08d55; }
        .food-btn { border-color: #F8AD9D; color: #e57e6a; }

        .converter-box {
            background: #f1f3ef;
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px dashed #B7B7A4;
        }

        .thinking-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* Day Tabs Styling */
        .day-tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 75px; height: 85px; 
            background: white; border: 1px solid #E5E7EB; border-radius: 16px;
            margin-right: 10px; transition: all 0.3s;
            flex-shrink: 0; 
            cursor: pointer;
            position: relative;
        }
        .day-tab.active {
            background: #6B705C; border-color: #6B705C; color: white; box-shadow: 0 6px 16px rgba(107, 112, 92, 0.3);
        }
        .day-tab-num { font-size: 14px; font-weight: 900; }
        .day-tab-date { font-size: 10px; margin-top: 4px; opacity: 0.8; font-weight: 600; padding: 0 4px; }
        
        /* Timeline styling */
        .timeline-item { border-left: 3px solid #E5E7EB; margin-left: 12px; padding-left: 18px; position: relative; }
        .timeline-item::before {
            content: ''; position: absolute; left: -7px; top: 16px; width: 11px; height: 11px; border-radius: 50%; background: #E5E7EB; border: 2.5px solid white;
        }
        .timeline-food { border-left-color: #F8AD9D; }
        .timeline-food::before { background: #F8AD9D; }
        .timeline-view { border-left-color: #8E9775; }
        .timeline-view::before { background: #8E9775; }
        .timeline-shop { border-left-color: #DDB892; }
        .timeline-shop::before { background: #DDB892; }
        .timeline-note { border-left-color: #A5A58D; }
        .timeline-note::before { background: #A5A58D; }
        .timeline-massage { border-left-color: #B5838D; }
        .timeline-massage::before { background: #B5838D; }
        .timeline-play { border-left-color: #CB997E; }
        .timeline-play::before { background: #CB997E; }

        /* Packing Filter Tabs */
        .pack-filter-btn {
            width: 36px; height: 36px; 
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .pack-filter-btn.active {
            background: #6B705C; border-color: #6B705C; color: white; transform: scale(1.1);
        }
        .pack-filter-btn-tina.active { background: #F8AD9D; border-color: #F8AD9D; }
        
        /* Input & Button Base Paddings for Large Phones */
        .input-base { padding: 0.6rem 0.75rem; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxcDDn80ScpW35TdJdeXOAkfJbHM0DyD0",
            authDomain: "honeymoon-2026.firebaseapp.com",
            projectId: "honeymoon-2026",
            storageBucket: "honeymoon-2026.firebasestorage.app",
            messagingSenderId: "639168649822",
            appId: "1:639168649822:web:20399eff7d34144277f2cf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "honeymoon-2026";
        
        let currentUser = null;
        let allExpenses = []; 
        let currentPayerFilter = 'all'; 
        let currentDayFilter = 'Day 1'; 
        
        // Data Stores
        let itineraryData = []; 
        let flightsData = [];
        let hotelsData = [];
        let packingData = []; 
        let chatHistory = []; 
        
        // Day Management State
        let dayList = ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7']; 
        let dayDates = {}; 
        
        // Edit State
        let editingItineraryId = null;
        let editingFlightId = null;
        let editingHotelId = null;
        let editingExpenseId = null;

        // Default packing filters
        let packFilters = { tina: 'cloth', darren: 'cloth' };
        
        const packCategories = [
            { id: 'cloth', icon: '👔', label: '衣物' },
            { id: 'wash', icon: '🧼', label: '盥洗' },
            { id: 'tech', icon: '📱', label: '3C' },
            { id: 'med', icon: '💊', label: '藥品' },
            { id: 'doc', icon: '📄', label: '文件' },
            { id: 'other', icon: '🎒', label: '其他' }
        ];

        // Live Exchange Rates (v6.3)
        let ratesToTHB = { 'THB': 1, 'TWD': 1.05, 'USD': 35.5 }; // Default fallbacks

        const fetchLiveRates = async () => {
            try {
                // Fetch USD base rates from a free API
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if (data && data.rates) {
                    const usdToThb = data.rates.THB;
                    const usdToTwd = data.rates.TWD;
                    
                    // Calculate cross rates relative to THB
                    ratesToTHB['THB'] = 1;
                    ratesToTHB['USD'] = usdToThb;
                    ratesToTHB['TWD'] = usdToThb / usdToTwd;
                    
                    console.log('Live rates updated:', ratesToTHB);
                    // Re-render expenses to apply new rates
                    if (allExpenses.length > 0) window.renderExpenses();
                }
            } catch (e) {
                console.error('Failed to fetch live rates, using defaults', e);
            }
        };

        onAuthStateChanged(auth, async (user) => { 
            if (user) { 
                currentUser = user; 
                startSyncing(); 
            } else { 
                await signInAnonymously(auth); 
            } 
        });

        const getColl = (n) => collection(db, 'artifacts', appId, 'public', 'data', n);

        function startSyncing() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'days'), (docSnap) => {
                if (docSnap.exists() && docSnap.data().list) dayList = docSnap.data().list;
                if (!dayList.includes(currentDayFilter) && dayList.length > 0) currentDayFilter = dayList[0];
                renderDayTabs();
                renderDayDropdown();
                if(document.getElementById('day-manage-modal').classList.contains('open')) renderDayManagerList();
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'dates'), (docSnap) => {
                if (docSnap.exists()) {
                    dayDates = docSnap.data();
                    renderDayTabs();
                }
            });

            onSnapshot(getColl('itinerary'), (s) => {
                itineraryData = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderItinerary();
            });
            onSnapshot(getColl('packing'), (s) => {
                packingData = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderPacking();
            });
            onSnapshot(getColl('expenses'), (s) => {
                allExpenses = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderExpenses();
            });
            onSnapshot(getColl('flights'), (s) => {
                flightsData = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderFlights();
            });
            onSnapshot(getColl('hotels'), (s) => {
                hotelsData = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderHotels();
            });
        }

        // --- UI Rendering Helpers ---
        window.renderDayTabs = () => {
            const container = document.getElementById('day-tabs-container');
            let html = dayList.map(dayStr => {
                const dateStr = dayDates[dayStr] || ''; 
                const isActive = currentDayFilter === dayStr;
                const formattedDate = window.formatDisplayDate(dateStr);
                let dateDisplay = formattedDate ? formattedDate : '日期';
                
                return `
                <div onclick="window.setDayFilter('${dayStr}')" class="day-tab ${isActive ? 'active' : ''}">
                    <div class="day-tab-num">${dayStr}</div>
                    ${isActive && !document.getElementById('day-manage-modal').classList.contains('open')
                        ? `<div class="relative mt-1.5 w-full flex justify-center">
                             <div class="bg-white/20 text-center px-2 py-0.5 text-[10px] rounded-md text-white font-bold whitespace-nowrap tracking-wide">${formattedDate || '選日期 📅'}</div>
                             <input type="date" value="${dateStr}" onclick="event.stopPropagation()" onchange="window.saveDate('${dayStr}', this.value)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                           </div>`
                        : `<div class="day-tab-date truncate w-full text-center px-1">${dateDisplay}</div>`
                    }
                </div>`;
            }).join('');

            html += `<div onclick="window.toggleDayManager()" class="day-tab bg-gray-50 border-dashed border-2 flex items-center justify-center opacity-70 hover:opacity-100 cursor-pointer"><div class="text-2xl">⚙️</div></div>`;
            container.innerHTML = html;
        };

        window.renderDayDropdown = () => {
            const select = document.getElementById('it-day');
            if(!select) return;
            select.innerHTML = dayList.map(d => `<option value="${d}">${d}</option>`).join('');
            select.value = dayList.includes(currentDayFilter) ? currentDayFilter : (dayList[0] || '');
        };

        window.setDayFilter = (day) => { currentDayFilter = day; renderDayTabs(); renderItinerary(); };
        window.saveDate = async (day, val) => { if(currentUser) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'dates'), { [day]: val }, { merge: true }); };

        // --- Day Management Modals ---
        window.toggleDayManager = () => {
            const modal = document.getElementById('day-manage-modal');
            modal.classList.toggle('open');
            if (modal.classList.contains('open')) window.renderDayManagerList();
        };

        window.renderDayManagerList = () => {
            const container = document.getElementById('day-manager-list');
            container.innerHTML = dayList.map(d => `
                <div class="flex justify-between items-center bg-white p-3.5 rounded-xl border border-gray-100 shadow-sm mb-3">
                    <span class="font-bold text-base text-[#4A4E40]">${d}</span>
                    <div class="flex gap-2">
                        <button onclick="window.openRenameModal('${d}')" class="text-gray-400 hover:text-[#6B705C] bg-gray-50 p-2.5 rounded-lg text-base">✎</button>
                        <button onclick="window.openDeleteModal('${d}')" class="text-gray-400 hover:text-red-400 bg-gray-50 p-2.5 rounded-lg text-base">✕</button>
                    </div>
                </div>
            `).join('');
        };

        window.addNewDay = async () => {
            const input = document.getElementById('new-day-input');
            const newDay = input.value.trim();
            if (!newDay) return;
            if (dayList.includes(newDay)) {
                input.value = ''; input.placeholder = '名稱已存在！請換一個'; return;
            }
            const updatedList = [...dayList, newDay];
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'days'), { list: updatedList }, { merge: true });
            input.value = ''; input.placeholder = '例如: Day 8 或 普吉島第一天';
        };

        window.openRenameModal = (oldName) => {
            document.getElementById('rename-day-old').value = oldName;
            document.getElementById('rename-day-input').value = oldName;
            document.getElementById('rename-day-modal').classList.add('open');
        };
        
        window.closeRenameModal = () => { document.getElementById('rename-day-modal').classList.remove('open'); };

        window.confirmRenameDay = async () => {
            const oldName = document.getElementById('rename-day-old').value;
            const newName = document.getElementById('rename-day-input').value.trim();
            
            if (!newName || newName === oldName || dayList.includes(newName)) { window.closeRenameModal(); return; }

            const updatedList = dayList.map(d => d === oldName ? newName : d);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'days'), { list: updatedList }, { merge: true });

            if (dayDates[oldName]) {
                const newDates = { ...dayDates };
                newDates[newName] = newDates[oldName];
                delete newDates[oldName]; 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'dates'), { [newName]: dayDates[oldName] }, { merge: true });
            }

            const itemsToUpdate = itineraryData.filter(i => i.day === oldName);
            for (let item of itemsToUpdate) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', item.id), { day: newName });
            }

            if(currentDayFilter === oldName) currentDayFilter = newName;
            window.closeRenameModal();
        };

        window.openDeleteModal = (dayName) => {
            document.getElementById('delete-day-target').value = dayName;
            document.getElementById('delete-day-name-display').innerText = dayName;
            document.getElementById('delete-day-modal').classList.add('open');
        };

        window.closeDeleteModal = () => { document.getElementById('delete-day-modal').classList.remove('open'); };

        window.confirmDeleteDay = async () => {
            const dayName = document.getElementById('delete-day-target').value;
            const updatedList = dayList.filter(d => d !== dayName);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'days'), { list: updatedList }, { merge: true });
            
            if (currentDayFilter === dayName) currentDayFilter = updatedList.length > 0 ? updatedList[0] : '';
            window.closeDeleteModal();
        };

        // --- Itinerary Logic (Modified for v6.1 Buttons) ---
        window.editItinerary = (id) => {
            const item = itineraryData.find(i => i.id === id);
            if (!item) return;
            
            editingItineraryId = id;
            document.getElementById('it-day').value = item.day;
            document.getElementById('it-type').value = item.type;
            document.getElementById('it-activity').value = item.activity;
            document.getElementById('it-note').value = item.note || '';
            
            if (item.time.includes('-')) {
                const times = item.time.split('-').map(t => t.trim());
                document.getElementById('it-time-start').value = times[0];
                document.getElementById('it-time-end').value = times[1];
            } else {
                document.getElementById('it-time-start').value = item.time;
                document.getElementById('it-time-end').value = '';
            }

            document.getElementById('btn-add-itinerary').innerText = '確認修改 ✅';
            document.getElementById('btn-cancel-itinerary').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEditItinerary = () => {
            editingItineraryId = null;
            document.getElementById('it-activity').value = '';
            document.getElementById('it-time-end').value = '';
            document.getElementById('it-note').value = '';
            document.getElementById('it-day').value = currentDayFilter; 
            
            document.getElementById('btn-add-itinerary').innerText = '加入行程地圖';
            document.getElementById('btn-cancel-itinerary').classList.add('hidden');
        };

        window.addItinerary = async () => {
            const act = document.getElementById('it-activity').value; if(!act || !currentUser) return;
            const dayVal = document.getElementById('it-day').value;
            const noteVal = document.getElementById('it-note').value; 
            const startTime = document.getElementById('it-time-start').value || '12:00';
            const endTime = document.getElementById('it-time-end').value;
            const timeVal = endTime ? `${startTime} - ${endTime}` : startTime;
            const typeVal = document.getElementById('it-type').value;

            if (editingItineraryId) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', editingItineraryId), {
                    day: dayVal, time: timeVal, activity: act, note: noteVal, type: typeVal
                });
                window.cancelEditItinerary(); 
            } else {
                await addDoc(getColl('itinerary'), { 
                    day: dayVal, time: timeVal, activity: act, note: noteVal, type: typeVal 
                });
                document.getElementById('it-activity').value = '';
                document.getElementById('it-time-end').value = '';
                document.getElementById('it-note').value = '';
            }
            window.setDayFilter(dayVal);
        };

        function renderItinerary() {
            const list = document.getElementById('it-list');
            const filtered = itineraryData.filter(item => item.day === currentDayFilter);
            const sorted = filtered.sort((a,b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
            
            if (sorted.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 text-sm py-12 font-bold">這天還沒有行程喔 💤</div>`;
                return;
            }

            list.innerHTML = sorted.map(item => {
                let typeClass = '';
                let typeLabel = '';
                const safeText = item.activity.replace(/'/g, "\\'"); 
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.activity)}`;

                switch(item.type) {
                    case 'food': typeClass = 'timeline-food'; typeLabel = '🍴 美食'; break;
                    case 'shop': typeClass = 'timeline-shop'; typeLabel = '🛍️ 購物'; break;
                    case 'view': typeClass = 'timeline-view'; typeLabel = '📸 景點'; break;
                    case 'massage': typeClass = 'timeline-massage'; typeLabel = '💆 按摩'; break;
                    case 'play': typeClass = 'timeline-play'; typeLabel = '🎢 玩樂'; break;
                    case 'note': typeClass = 'timeline-note'; typeLabel = '📝 備註'; break;
                    default: typeClass = 'timeline-view'; typeLabel = '📍 行程';
                }

                return `
                <div class="app-card p-4 mb-4 ${typeClass} timeline-item relative">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1.5">

        window.setPayerFilter = (p) => { currentPayerFilter = p; document.querySelectorAll('.filter-chip').forEach(el => el.classList.toggle('active', el.id === 'chip-'+p)); window.renderExpenses(); };

        window.addPacking = async () => { const v = document.getElementById('pack-item').value; const c = document.getElementById('pack-category').value; const o = document.getElementById('pack-owner').value; if(!v || !currentUser) return; await addDoc(getColl('packing'), { item: v, owner: o, checked: false, category: c }); document.getElementById('pack-item').value = ''; };
        window.togglePack = async (id, s) => { if(currentUser) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'packing', id), { checked: !s }); };
        window.renderPacking = () => {
            const draw = (o, cid) => {
                const items = packingData.filter(i => i.owner === o && i.category === packFilters[o]);
                const tabs = `<div class="flex gap-2 mb-3 overflow-x-auto no-scrollbar">${packCategories.map(c => `<button onclick="window.setPackFilter('${o}','${c.id}')" class="pack-filter-btn ${o==='tina'?'pack-filter-btn-tina':''} ${packFilters[o]===c.id?'active':''}">${c.icon}</button>`).join('')}</div>`;
                document.getElementById(cid).innerHTML = tabs + `<div class="bg-white rounded-xl shadow-sm border border-gray-100">${items.map(i => `<div class="p-3.5 flex items-center gap-3 border-b last:border-0"><div onclick="window.togglePack('${i.id}', ${i.checked})" class="w-5 h-5 rounded border-2 ${i.checked?'bg-[#6B705C] border-[#6B705C]':'border-gray-300'}"></div><span class="flex-1 ${i.checked?'line-through text-gray-300':'font-bold'}">${i.item}</span><button onclick="window.deleteItem('packing','${i.id}')" class="text-gray-300">✕</button></div>`).join('')}</div>`;
            };
            draw('tina', 'pk-list-tina'); draw('darren', 'pk-list-darren');
        };
        window.setPackFilter = (o, c) => { packFilters[o] = c; renderPacking(); };

        document.addEventListener('DOMContentLoaded', () => { 
            document.getElementById('exp-date').valueAsDate = new Date(); 
            fetchLiveRates(); // Fetch live rates on load
        });
        window.switchTab('itinerary');
        window.getWeather();
    </script>
</head>
<body class="max-w-md mx-auto relative bg-white md:bg-gray-100 min-h-screen">
    <div class="bg-[var(--bg-light)] min-h-screen shadow-2xl relative pb-24">
        <header class="main-header">
            <div class="heart-text"><span>♥</span> SWEET GETAWAY <span>♥</span></div>
            <h1 class="couple-name">DARREN <span class="ampersand">&</span> TINA</h1>
            <p class="text-[11px] font-black text-[#8E9775] mt-1 tracking-[0.2em] uppercase">2026 Bangkok Phuket 🇹🇭✈️</p>
        </header>

        <main class="p-4">
            <!-- 行程分頁 -->
            <div id="content-itinerary" class="tab-content">
                <div class="weather-card flex justify-between items-center shadow-lg cursor-pointer" onclick="window.askGemini('幫我看看曼谷今天天氣如何，有什麼蜜月行程建議或該注意的嗎？')">
                    <div id="weather-display">
                        <div class="text-xl font-black">正在抓取天氣...</div>
                    </div>
                    <div class="text-4xl">☀️</div>
                </div>

                <div id="day-tabs-container" class="flex overflow-x-auto no-scrollbar pb-3 mb-3 items-center gap-3"></div>
                
                <div class="app-card p-5 bg-white/80 mb-5 border-dashed border-2 border-gray-200">
                    <div class="flex gap-3 mb-3">
                        <select id="it-day" class="w-1/3 bg-gray-50 input-base rounded-xl text-sm font-bold outline-none"></select>
                        <input type="time" id="it-time-start" class="flex-1 bg-gray-50 input-base rounded-xl text-sm font-bold text-center">
                    </div>
                    <div class="flex gap-3 mb-3">
                        <select id="it-type" class="w-1/3 bg-gray-50 input-base rounded-xl text-sm font-bold outline-none">
                            <option value="view">📸 景點</option><option value="food">🍴 美食</option><option value="shop">🛍️ 購物</option><option value="massage">💆 按摩</option><option value="play">🎢 玩樂</option><option value="note">📝 備註</option>
                        </select>
                        <input type="text" id="it-activity" placeholder="要去哪裡呢？" class="flex-1 bg-gray-50 input-base rounded-xl text-sm outline-none">
                    </div>
                    <button onclick="window.addItinerary()" id="btn-add-itinerary" class="bg-[#4A4E40] text-white w-full py-3.5 rounded-xl font-bold text-sm">加入行程地圖</button>
                    <button onclick="window.cancelEditItinerary()" id="btn-cancel-itinerary" class="bg-gray-200 text-gray-600 w-full mt-2 py-3.5 rounded-xl font-bold text-sm hidden">取消修改</button>
                </div>
                
                <div id="it-list"></div>
            </div>

            <!-- 其他分頁 (交通住宿、記帳、行李) -->
            <div id="content-core" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="text-base font-black text-[#4A4E40]">航班資訊 ✈️</h3>
                    <button onclick="window.toggleSection('flight')" class="text-xs bg-[#6B705C] text-white px-4 py-1.5 rounded-full font-bold shadow-sm">＋新增</button>
                </div>
                <div id="flight-grid" class="expand-panel app-card p-5 mb-5 bg-gray-50">
                    <input type="text" id="f-code" placeholder="航班號 (如 TG635)" class="w-full p-3 rounded-xl mb-3 font-black outline-none border border-gray-200"><div class="grid grid-cols-2 gap-3 mb-3"><input type="text" id="f-from" placeholder="出發地" class="p-3 rounded-xl text-sm outline-none border border-gray-200"><input type="text" id="f-to" placeholder="目的地" class="p-3 rounded-xl text-sm outline-none border border-gray-200"></div><div class="grid grid-cols-2 gap-3 mb-3"><input type="date" id="f-date" class="p-3 rounded-xl text-sm outline-none border border-gray-200"><input type="text" id="f-duration" placeholder="飛行時間" class="p-3 rounded-xl text-sm outline-none border border-gray-200"></div><div class="grid grid-cols-3 gap-3 mb-3"><input type="time" id="f-depTime" class="p-3 rounded-xl text-sm outline-none border border-gray-200"><input type="time" id="f-arrTime" class="p-3 rounded-xl text-sm outline-none border border-gray-200"><input type="time" id="f-checkinTime" class="p-3 rounded-xl text-sm outline-none border border-gray-200"></div><input type="text" id="f-seat" placeholder="座位" class="w-full p-3 rounded-xl text-sm mb-3 outline-none border border-gray-200"><input type="text" id="f-note" placeholder="備註" class="w-full p-3 rounded-xl text-sm mb-4 outline-none border border-gray-200"><button onclick="window.addFlight()" id="btn-add-flight" class="w-full bg-[#6B705C] text-white py-3.5 rounded-xl text-sm font-bold">儲存航班</button><button onclick="window.cancelEditFlight()" id="btn-cancel-flight" class="w-full mt-2 bg-gray-200 text-gray-600 py-3.5 rounded-xl text-sm font-bold hidden">取消</button>
                </div>
                <div id="flights-list"></div>
                
                <div class="flex justify-between items-center mt-8 mb-4 px-1">
                    <h3 class="text-base font-black text-[#4A4E40]">入住飯店 🏨</h3>
                    <button onclick="window.toggleSection('hotel')" class="text-xs bg-[#DDB892] text-white px-4 py-1.5 rounded-full font-bold shadow-sm">＋新增</button>
                </div>
                <div id="hotel-grid" class="expand-panel app-card p-5 mb-5 bg-gray-50">
                    <input type="text" id="h-name" placeholder="飯店名稱" class="w-full p-3 rounded-xl mb-3 font-black outline-none border border-gray-200"><div class="flex gap-3 mb-3"><input type="date" id="h-checkin" class="flex-1 p-3 rounded-xl text-sm outline-none border border-gray-200"><input type="date" id="h-checkout" class="flex-1 p-3 rounded-xl text-sm outline-none border border-gray-200"></div><input type="text" id="h-room" placeholder="房號" class="w-full p-3 rounded-xl text-sm mb-3 outline-none border border-gray-200"><input type="text" id="h-note" placeholder="備註" class="w-full p-3 rounded-xl text-sm mb-4 outline-none border border-gray-200"><button onclick="window.addHotel()" id="btn-add-hotel" class="w-full bg-[#DDB892] text-white py-3.5 rounded-xl text-sm font-bold">儲存飯店</button><button onclick="window.cancelEditHotel()" id="btn-cancel-hotel" class="w-full mt-2 bg-gray-200 text-gray-600 py-3.5 rounded-xl text-sm font-bold hidden">取消</button>
                </div>
                <div id="hotels-list"></div>
            </div>

            <div id="content-budget" class="tab-content hidden">
                <div class="converter-box mb-6"><div class="flex gap-2"><input type="number" id="conv-input" oninput="window.calcIndependentRate()" class="flex-1 p-3 rounded-xl shadow-sm text-sm" placeholder="輸入金額"><select id="conv-curr" onchange="window.calcIndependentRate()" class="bg-white p-3 rounded-xl text-xs font-black"><option value="TWD">TWD 台幣</option><option value="THB">THB 泰銖</option></select></div><div id="conv-res" class="mt-2 text-sm font-black italic">泰銖 ฿ 0</div></div>
                <div class="app-card bg-[#6B705C] p-6 text-white mb-5 shadow-lg"><h2 id="total-amount" class="text-4xl font-black">฿ 0</h2></div>
                <div class="flex gap-3 mb-5 overflow-x-auto pb-2 no-scrollbar"><button onclick="window.setPayerFilter('all')" id="chip-all" class="filter-chip active flex-shrink-0 shadow-sm">全部</button><button onclick="window.setPayerFilter('tina')" id="chip-tina" class="filter-chip flex-shrink-0 shadow-sm"><div class="font-black text-sm">Tina</div><div id="chip-tina-amt" class="text-[10px] font-bold mt-1 opacity-80"></div></button><button onclick="window.setPayerFilter('darren')" id="chip-darren" class="filter-chip flex-shrink-0 shadow-sm"><div class="font-black text-sm">Darren</div><div id="chip-darren-amt" class="text-[10px] font-bold mt-1 opacity-80"></div></button></div>
                <div class="app-card p-5 space-y-3 mb-5">
                    <input type="date" id="exp-date" class="w-full bg-gray-50 p-3 rounded-xl text-sm font-bold border border-gray-100">
                    <input type="text" id="exp-item" placeholder="支出項目" class="w-full bg-gray-50 p-3 rounded-xl text-sm">
                    <div class="flex gap-2"><select id="exp-currency" onchange="window.updateExchangePreview()" class="w-1/3 bg-gray-50 p-3 rounded-xl text-xs font-bold border border-gray-100"><option value="THB">THB</option><option value="TWD">TWD</option></select><input type="number" id="exp-cost" oninput="window.updateExchangePreview()" placeholder="金額" class="flex-1 bg-gray-50 p-3 rounded-xl text-sm font-bold"></div>
                    <div id="exchange-hint" class="text-[10px] text-gray-400 italic px-1 h-3"></div>
                    <select id="exp-payer" class="w-full bg-gray-100 p-3 rounded-xl text-xs font-black"><option value="tina">Tina 支付 💰</option><option value="darren">Darren 支付 💳</option></select>
                    <button onclick="window.addExpense()" id="btn-add-expense" class="w-full bg-[#2D3128] text-white py-3.5 rounded-xl font-bold shadow-md">新 增 記 帳</button>
                    <button onclick="window.cancelEditExpense()" id="btn-cancel-expense" class="w-full mt-2 bg-gray-200 text-gray-600 py-3.5 rounded-xl font-bold hidden">取消修改</button>
                </div>
                <div id="exp-list"></div>
            </div>

            <div id="content-packing" class="tab-content hidden">
                <div class="app-card p-5 mb-5 shadow-sm border border-gray-100">
                    <select id="pack-category" class="w-full bg-gray-100 p-3 rounded-xl text-xs font-bold mb-3 border-none"><option value="cloth">👔 個人衣物</option><option value="wash">🧼 個人盥洗</option><option value="tech">📱 3C 產品</option><option value="med">💊 個人藥品</option><option value="doc">📄 重要文件</option><option value="other">🎒 其他</option></select>
                    <div class="flex gap-2 mb-3"><input type="text" id="pack-item" placeholder="東西帶齊沒？" class="flex-1 bg-gray-50 p-3 rounded-xl text-sm border border-gray-100"><select id="pack-owner" class="bg-gray-50 px-4 rounded-xl text-xs font-bold"><option value="tina">Tina</option><option value="darren">Darren</option></select></div>
                    <button onclick="window.addPacking()" class="w-full bg-[#6B705C] text-white py-3.5 rounded-xl font-bold text-xs">加入清單</button>
                </div>
                <div class="grid grid-cols-2 gap-4"><div><p class="text-[10px] font-black text-[#F8AD9D] mb-2 uppercase">Tina's</p><div id="pk-list-tina"></div></div><div><p class="text-[10px] font-bold text-[#6B705C] mb-2 uppercase">Darren's</p><div id="pk-list-darren"></div></div></div>
            </div>
        </main>

        <!-- AI 助理 Modal -->
        <div id="gemini-modal" onclick="if(event.target === this) window.toggleGemini()">
            <div id="gemini-panel" onclick="event.stopPropagation()">
                <div class="p-6 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center gap-3">
                            <h3 class="font-black text-xl text-[#4A4E40]">✨ 旗艦蜜月管家 <span class="text-[10px] text-gray-400 font-normal">v6.3</span></h3>
                            <button onclick="window.clearGemini()" class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-400 font-bold active:bg-gray-200 transition-colors">清除記憶</button>
                        </div>
                        <button onclick="window.toggleGemini()" class="text-3xl text-gray-300">✕</button>
                    </div>
                    <div id="gemini-chat" class="flex-1 overflow-y-auto mb-4 space-y-4 px-1 no-scrollbar"></div>
                    <div class="flex gap-3 p-2 bg-white rounded-2xl shadow-xl border border-gray-100">
                        <input type="text" id="gemini-input" placeholder="問問貼心管家..." class="flex-1 p-3.5 text-base outline-none bg-transparent">
                        <button onclick="window.askGemini()" class="bg-[#6B705C] text-white px-6 rounded-xl font-bold transition-transform active:scale-95">發送</button>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div onclick="window.switchTab('core')" id="btn-core" class="nav-btn btn-press opacity-30">🛫</div>
            <div onclick="window.switchTab('itinerary')" id="btn-itinerary" class="nav-btn btn-press">🗺️</div>
            <div onclick="window.switchTab('packing')" id="btn-packing" class="nav-btn btn-press opacity-30">🎒</div>
            <div onclick="window.switchTab('budget')" id="btn-budget" class="nav-btn btn-press opacity-30">💰</div>
            <div onclick="window.toggleGemini()" class="nav-btn btn-press">✨</div>
        </nav>

        <!-- 管理天數的 Modals -->
        <div id="day-manage-modal" class="custom-modal" onclick="if(event.target === this) window.toggleDayManager()">
            <div class="modal-panel flex flex-col p-6" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="font-black text-xl text-[#4A4E40]">⚙️ 管理天數</h3>
                    <button onclick="window.toggleDayManager()" class="text-3xl text-gray-300 active:text-gray-500 transition-colors">✕</button>
                </div>
                <div id="day-manager-list" class="flex-1 overflow-y-auto pb-4 px-1"></div>
                <div class="bg-white p-5 rounded-2xl shadow-md border border-gray-100 mt-3">
                    <div class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">新增天數</div>
                    <div class="flex gap-3">
                        <input type="text" id="new-day-input" placeholder="如: Day 8" class="flex-1 p-3 bg-gray-50 rounded-xl text-base font-bold outline-none border border-gray-200">
                        <button onclick="window.addNewDay()" class="bg-[#6B705C] text-white px-6 rounded-xl text-sm font-bold shadow-sm">新增</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="rename-day-modal" class="custom-modal">
            <div class="centered-modal-content p-6">
                <h3 class="font-black text-xl text-[#4A4E40] mb-5">修改名稱</h3>
                <input type="hidden" id="rename-day-old">
                <input type="text" id="rename-day-input" class="w-full p-4 bg-gray-50 rounded-xl text-lg font-bold outline-none mb-5 border border-gray-200 text-center">
                <div class="flex gap-4">
                    <button onclick="window.closeRenameModal()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-xl text-sm font-bold">取消</button>
                    <button onclick="window.confirmRenameDay()" class="flex-1 bg-[#6B705C] text-white py-3.5 rounded-xl text-sm font-bold shadow-sm">確認修改</button>
                </div>
            </div>
        </div>

        <div id="delete-day-modal" class="custom-modal">
            <div class="centered-modal-content text-center p-6">
                <div class="text-5xl mb-4">🗑️</div>
                <h3 class="font-black text-xl text-[#4A4E40] mb-3">確定刪除 <span id="delete-day-name-display" class="text-red-500"></span>？</h3>
                <p class="text-sm text-gray-500 font-bold mb-8 leading-relaxed">不會刪除已綁定的行程資料。</p>
                <input type="hidden" id="delete-day-target">
                <div class="flex gap-4">
                    <button onclick="window.closeDeleteModal()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-xl text-sm font-bold">取消</button>
                    <button onclick="window.confirmDeleteDay()" class="flex-1 bg-red-500 text-white py-3.5 rounded-xl text-sm font-bold shadow-sm">確認刪除</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
